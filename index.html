<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proje-Geliştirici Profil Kartı</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kart">
<div class="kart-sekli"></div>

<div class="kart-govdesi">
<div class="kart-resmi">
<img src="./image/profile.jpeg" alt="Reiscan Kayaer">
</div>

<div class="kart-icerigi">
<h1 class="isim">Reiscan Kayaer</h1>
<p class="kullanici-adi">@reiscan.kyr</p>
<p class="hakkinda">Full Stack Developer kursuna katıldım!</p>

<div class="istatistikler">
<div class="istatistik-ogesi">
<span class="istatistik-degeri">19K</span>
<span class="istatistik-etiketi">Views</span>
</div>
<div class="istatistik-ogesi">
<span class="istatistik-degeri">1.9K</span>
<span class="istatistik-etiketi">Projects</span>
</div>
<div class="istatistik-ogesi">
<span class="istatistik-degeri">19K</span>
<span class="istatistik-etiketi">Followers</span>
</div>
</div>

<div class="butonlar">
<button class="buton buton-takip">Follow</button>
<button class="buton buton-profil">View profile</button>
</div>
</div>
</div>
</div>

</body>
</html>
